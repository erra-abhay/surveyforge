version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: surveyforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: surveyforge

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: surveyforge-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/surveyforge
      - JWT_SECRET=surveyforge_super_secret_jwt_key_in_production
      - JWT_REFRESH_SECRET=surveyforge_super_secret_refresh_key_in_production
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api/v1
    container_name: surveyforge-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
